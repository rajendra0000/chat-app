spring.application.name=chat-backend

# Active profile (overridden to "prod" on Render via env var SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── PostgreSQL ──────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chatuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:chatpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool — keep small for Neon free tier (max 50 conns shared)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ──────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Redis (URI-based — supports Upstash rediss:// TLS) ──────────
spring.data.redis.url=${SPRING_REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# ─── RabbitMQ (URI-based — supports CloudAMQP amqps://) ──────────
spring.rabbitmq.uri=${RABBITMQ_URI:amqp://guest:guest@localhost:5672}
spring.rabbitmq.queue=chat-queue

# RabbitMQ retry
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ─── Cloudinary ──────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy_api_secret}

# ── Email OTP — Gmail SMTP (spring-boot-starter-mail) ───────────
# Use your Gmail address + an App Password (NOT your Gmail password)
# App Password: https://myaccount.google.com/apppasswords
# Enable 2FA first, then generate an App Password for "Mail"
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_gmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_gmail_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.name=${APP_NAME:SkibidiChat}

# ─── CORS ────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://localhost:8080}

# ─── AI (Groq / OpenAI-compatible) ───────────────────────────────
ai.enabled=${AI_ENABLED:true}
ai.bot-name=kalori
ai.base-url=${AI_BASE_URL:https://api.groq.com/openai/v1}
ai.model=${AI_MODEL:llama-3.3-70b-versatile}
ai.max-context-messages=20
ai.api-key=${GROK_API_KEY:}
ai.rate-limit-per-minute=20
ai.timeout-seconds=30
ai.connect-timeout-ms=5000

# ─── Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.redis.enabled=false
management.health.rabbit.enabled=false
server.port=${PORT:8080}

# ─── File uploads ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Server ──────────────────────────────────────────────────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Trust Render's reverse proxy for HTTPS/forwarded headers
server.forward-headers-strategy=framework

# ─── Logging ─────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.redis=WARN
logging.level.org.apache.coyote.http11=WARN
logging.level.com.chatapp.backend=INFO
